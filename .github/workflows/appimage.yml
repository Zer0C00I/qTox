name: AppImage

on:
  schedule: [cron: '0 2 * * *']
  workflow_dispatch:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags: ["v*"]

concurrency:
  group: appimage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build-appimage:
    name: AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            file \
            libavcodec-dev \
            libavdevice-dev \
            libavformat-dev \
            libavutil-dev \
            libexif-dev \
            libgl-dev \
            libopenal-dev \
            libopus-dev \
            libqrencode-dev \
            libsodium-dev \
            libsqlcipher-dev \
            libswscale-dev \
            libunwind-dev \
            libv4l-dev \
            libvpx-dev \
            libxss-dev \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-l10n-tools \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            wget

      - name: Build toxcore
        run: |
          git clone --depth=1 --recursive https://github.com/TokTok/c-toxcore.git toxcore
          cmake -B toxcore/_build -S toxcore -GNinja -DBOOTSTRAP_DAEMON=OFF
          cmake --build toxcore/_build
          sudo cmake --install toxcore/_build

      - name: Build AppImage
        run: ./appimage/build.sh --src-dir .

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 'VERSION_MAJOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_MINOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_PATCH' cmake/Package.cmake | grep -oE '[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename AppImage
        run: mv io.github.qtox.qTox-*.AppImage "qtox-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtox-appimage
          path: qtox-*-x86_64.AppImage

      - name: Upload AppImage to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-*-x86_64.AppImage

      - name: Rename for nightly
        if: github.ref == 'refs/heads/master'
        run: cp "qtox-${{ steps.version.outputs.version }}-x86_64.AppImage" qtox-x86_64.AppImage

      - name: Upload AppImage to nightly release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-x86_64.AppImage
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          make_latest: false
