name: AppImage

on:
  schedule: [cron: '0 2 * * *']
  workflow_dispatch:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags: ["v*"]

concurrency:
  group: appimage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build-appimage:
    name: AppImage (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache compiler output
        uses: actions/cache@v4
        with:
          path: ".cache/ccache"
          key: ${{ github.job }}-ccache

      - name: Build AppImage
        run: docker compose run --rm alpine-appimage ./appimage/build.sh --src-dir /qtox

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 'VERSION_MAJOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_MINOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_PATCH' cmake/Package.cmake | grep -oE '[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename AppImage
        run: mv qTox-*.x86_64.AppImage "qtox-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtox-appimage
          path: qtox-*-x86_64.AppImage

      - name: Upload AppImage to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-*-x86_64.AppImage

      - name: Rename for nightly
        if: github.ref == 'refs/heads/master'
        run: cp "qtox-${{ steps.version.outputs.version }}-x86_64.AppImage" qtox-x86_64.AppImage

      - name: Upload AppImage to nightly release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-x86_64.AppImage
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          make_latest: false
