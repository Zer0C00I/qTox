name: FreeBSD

on:
  schedule: [cron: '0 4 * * *']
  workflow_dispatch:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags: ["v*"]

concurrency:
  group: freebsd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build-freebsd:
    name: FreeBSD 14
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg upgrade -y
            pkg install -y \
              cmake \
              ninja \
              pkgconf \
              qt6-base \
              qt6-tools \
              qt6-svg \
              openal-soft \
              opus \
              libvpx \
              v4l_compat \
              libexif \
              libqrencode \
              libsodium \
              sqlcipher \
              ffmpeg \
              toxcore \
              llvm
          run: |
            cmake -GNinja -B _build -S . \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DCMAKE_CXX_COMPILER=clang++ \
              -DSTRICT_OPTIONS=ON \
              -DUPDATE_CHECK=OFF \
              -DSPELL_CHECK=OFF
            cmake --build _build --parallel $(sysctl -n hw.ncpu)

            DESTDIR=_pkg cmake --install _build

            VERSION=$(grep -m1 'VERSION_MAJOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_MINOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_PATCH' cmake/Package.cmake | grep -oE '[0-9]+')
            ARCH=$(pkg config abi)

            find _pkg/usr/local -type f | sed 's|_pkg/usr/local/||' > PLIST

            sed -e "s|\${VERSION}|${VERSION}|g" \
                -e "s|\${ARCH}|${ARCH}|g" \
                platform/freebsd/MANIFEST.template > MANIFEST

            pkg create -M MANIFEST -p PLIST -r _pkg -o .
            rm -rf _build _pkg MANIFEST PLIST

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtox-freebsd14
          path: qtox-*.pkg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-*.pkg

      - name: Upload to nightly release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-*.pkg
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          make_latest: false
