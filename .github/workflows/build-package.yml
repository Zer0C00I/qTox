name: Package

on:
  # Run this workflow every day at 3:00 UTC to update caches.
  schedule: [cron: '0 3 * * *']
  # Allow manual trigger.
  workflow_dispatch:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags: ["v*"]

# Cancel old PR builds when pushing new commits.
concurrency:
  group: build-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build-rpm:
    name: RPM package (Fedora)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Cache compiler output
        uses: actions/cache@v4
        with:
          path: ".cache/ccache"
          key: ${{ github.job }}-ccache
      - name: Build RPM package
        run: docker compose run --rm fedora .ci-scripts/package-qtox-linux.sh --source-dir . --target-dir build_dir
      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtox-rpm
          path: build_dir/qtox-*.rpm
      - name: Upload RPM to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_dir/qtox-*.rpm

      - name: Rename RPM for nightly
        if: github.ref == 'refs/heads/master'
        run: mv build_dir/qtox-*.rpm build_dir/qtox-fc41.x86_64.rpm

      - name: Upload RPM to nightly release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: build_dir/qtox-fc41.x86_64.rpm
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          make_latest: false

  build-deb:
    name: DEB package (Ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            checkinstall \
            clang \
            cmake \
            libavcodec-dev \
            libavdevice-dev \
            libavformat-dev \
            libavutil-dev \
            libexif-dev \
            libgl-dev \
            libopenal-dev \
            libopus-dev \
            libqrencode-dev \
            libsodium-dev \
            libsqlcipher-dev \
            libswscale-dev \
            libunwind-dev \
            libv4l-dev \
            libvpx-dev \
            libxss-dev \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-l10n-tools \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools
      - name: Build toxcore
        run: |
          git clone --depth=1 --recursive https://github.com/TokTok/c-toxcore.git toxcore
          cmake -B toxcore/_build -S toxcore -GNinja -DBOOTSTRAP_DAEMON=OFF
          cmake --build toxcore/_build
          sudo cmake --install toxcore/_build
      - name: Build qTox
        run: |
          cmake --preset clang-strict
          cmake --build --preset clang-strict
      - name: Create DEB package
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          sudo checkinstall \
            --pkgname=qtox \
            --pkgversion="${VERSION#v}" \
            --pkgrelease=1 \
            --pkggroup=net \
            --pkglicense=GPL-3 \
            --pkgsource="https://github.com/${{ github.repository }}" \
            --maintainer="qTox contributors" \
            --pakdir=. \
            --install=no \
            --nodoc \
            --default \
            cmake --install _build_clang_strict
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtox-deb
          path: "*.deb"
      - name: Upload DEB to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"

      - name: Rename DEB for nightly
        if: github.ref == 'refs/heads/master'
        run: mv *.deb qtox-amd64.deb

      - name: Upload DEB to nightly release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-amd64.deb
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          make_latest: false
