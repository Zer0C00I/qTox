name: macOS

on:
  schedule: [cron: '0 5 * * *']
  workflow_dispatch:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    tags: ["v*"]

concurrency:
  group: macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build-macos:
    name: macOS 14 (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
          key: homebrew-macos14-${{ hashFiles('platform/macos/Brewfile') }}
          restore-keys: homebrew-macos14-

      - name: Install Homebrew dependencies
        run: |
          brew install \
            cmake ninja pkgconf \
            ffmpeg libexif libsodium libvpx \
            openal-soft opus qrencode \
            qt@6 sqlcipher \
            create-dmg ccache

      - name: Cache c-toxcore build
        id: cache-toxcore
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/libtoxcore*
          key: toxcore-0.2.22-macos14

      - name: Build c-toxcore
        if: steps.cache-toxcore.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v0.2.22 \
            https://github.com/TokTok/c-toxcore.git _toxcore
          cmake -GNinja -S _toxcore -B _toxcore/_build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDHT_BOOTSTRAP=OFF \
            -DBOOTSTRAP_DAEMON=OFF \
            -DENABLE_STATIC=OFF
          sudo cmake --build _toxcore/_build \
            --parallel $(sysctl -n hw.ncpu) --target install

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-macos14-${{ github.sha }}
          restore-keys: ccache-macos14-

      - name: Build qTox
        run: |
          export PATH="/opt/homebrew/opt/qt@6/bin:/opt/homebrew/opt/ccache/libexec:$PATH"
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openal-soft/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -GNinja -B _build -S . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSTRICT_OPTIONS=ON \
            -DUPDATE_CHECK=OFF \
            -DSPELL_CHECK=OFF
          cmake --build _build --parallel $(sysctl -n hw.ncpu)

      - name: Package .dmg
        run: |
          VERSION=$(grep -m1 'VERSION_MAJOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_MINOR' cmake/Package.cmake | grep -oE '[0-9]+').$(grep -m1 'VERSION_PATCH' cmake/Package.cmake | grep -oE '[0-9]+')
          /opt/homebrew/opt/qt@6/bin/macdeployqt _build/qtox.app
          create-dmg \
            --volname "qTox" \
            --background "platform/macos/backgroundImage.tiff" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "qtox.app" 200 190 \
            --hide-extension "qtox.app" \
            --app-drop-link 600 185 \
            "qtox-${VERSION}-macos.dmg" \
            "_build/qtox.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtox-macos
          path: qtox-*.dmg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qtox-*.dmg
